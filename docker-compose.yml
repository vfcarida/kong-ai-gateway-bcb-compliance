# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Kong AI Gateway — Docker Compose                                          ║
# ║  PoC: Blindagem PII para Compliance BCB 538/2025                           ║
# ║                                                                            ║
# ║  Serviços:                                                                 ║
# ║   • kong-gateway    — API Gateway (DB-less, Enterprise 3.14 LTS)          ║
# ║   • pii-sanitizer   — Serviço de detecção/ofuscação de PII (FastAPI)      ║
# ║                                                                            ║
# ║  Uso: docker compose up -d --build                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ── PII Sanitizer (FastAPI) ────────────────────────────────────────────────
  # Serviço customizado para detecção e ofuscação de PII brasileiro.
  # Não requer licença — construído internamente.
  pii-sanitizer:
    build:
      context: ./pii-sanitizer
      dockerfile: Dockerfile
    container_name: pii-sanitizer
    environment:
      - PORT=8088
    ports:
      - "8088:8088"
    networks:
      - kong-ai-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8088/health')"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Kong Gateway (DB-less) ────────────────────────────────────────────────
  # API Gateway Enterprise em modo declarativo.
  # Plugins configurados via kong.yaml (sem banco de dados).
  kong-gateway:
    image: kong/kong-gateway:3.14
    container_name: kong-gateway
    environment:
      # Modo DB-less
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yaml

      # Licença Enterprise (opcional — trial 30 dias)
      KONG_LICENSE_DATA: "${KONG_LICENSE_DATA:-}"

      # Listeners
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"

      # Logging
      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr

      # AWS Credentials (passadas ao ai-proxy via environment)
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"

      # PII Sanitizer config (usado pelo pre-function Lua)
      PII_REDACT_TYPE: "${PII_REDACT_TYPE:-placeholder}"

      # AI Model (usado pelo kong.yaml com env vars)
      DECK_AI_MODEL_NAME: "${AI_MODEL_NAME:-amazon.titan-text-express-v1}"
      DECK_AWS_REGION: "${AWS_REGION:-us-east-1}"
      DECK_AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      DECK_AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"

      # DNS (resolver nomes de containers na rede Docker)
      KONG_DNS_RESOLVER: ""
      KONG_UNTRUSTED_LUA: "on"

    volumes:
      # Configuração declarativa
      - ./config/kong.yaml:/usr/local/kong/declarative/kong.yaml:ro
      # Volume para audit logs
      - ./logs:/tmp/audit-logs

    ports:
      # Proxy (onde os clientes conectam)
      - "8000:8000"     # HTTP
      - "8443:8443"     # HTTPS
      # Admin API
      - "8001:8001"     # HTTP
      - "8444:8444"     # HTTPS
      # Kong Manager GUI
      - "8002:8002"

    networks:
      - kong-ai-net

    depends_on:
      pii-sanitizer:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

    restart: unless-stopped

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  kong-ai-net:
    name: kong-ai-net
    driver: bridge
